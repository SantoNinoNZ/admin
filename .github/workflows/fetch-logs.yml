name: Fetch Logs
on: workflow_dispatch
jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Fetch Logs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase logs --help
          supabase functions --help
          # Try to get edge function logs
          supabase logs edge-logs --project-ref $SUPABASE_PROJECT_ID --function submit-form > logs1.txt || true
          cat logs1.txt
          supabase logs --project-ref $SUPABASE_PROJECT_ID > logs2.txt || true
          cat logs2.txt
