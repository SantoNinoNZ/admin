name: Fetch Logs
on: workflow_dispatch
jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Fetch Logs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions --help || true
          # Not sure of the exact command, let's try `supabase functions logs` or `supabase logs`? Wait, according to docs, it's `supabase functions logs <function-name> --project-ref $SUPABASE_PROJECT_ID` (Wait, project-ref might not be supported directly, let's link the project first).
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase functions logs submit-form > logs.txt
          cat logs.txt
