# .github/workflows/functions-deploy.yml
name: 'Supabase Functions Deploy'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase functions
        run: |
          for F in supabase/functions/*; do
            if [ -d "$F" ]; then
              FUNCTION_NAME=$(basename "$F")
              if [ "$FUNCTION_NAME" != "_shared" ]; then
                echo "Deploying function: $FUNCTION_NAME"
                if [ "$FUNCTION_NAME" = "submit-form" ]; then
                  supabase functions deploy "$FUNCTION_NAME" --project-ref "$SUPABASE_PROJECT_ID" --no-verify-jwt
                else
                  supabase functions deploy "$FUNCTION_NAME" --project-ref "$SUPABASE_PROJECT_ID"
                fi
              fi
            fi
          done

      - name: Set edge function secrets
        run: |
          supabase secrets set TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }} \
            --project-ref "$SUPABASE_PROJECT_ID"
          
          # Also set the Resend API Key for sending emails
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
            supabase secrets set RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
              --project-ref "$SUPABASE_PROJECT_ID"
          fi
