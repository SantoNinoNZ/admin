# .github/workflows/db-migrate.yml
name: 'Supabase DB Migration'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate-db:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref uvxrdmwmscevovbbrnky

      - name: Reconcile migration history
        run: |
          echo "Current migration state:"
          supabase migration list 2>&1 || true

          # Versions 005 and 006 were superseded by 014-017 (renumbered to avoid duplicates).
          # Remove them from schema_migrations so they no longer block the push.
          echo "Reverting superseded versions 005 and 006..."
          supabase migration repair --status reverted 005 2>/dev/null || true
          supabase migration repair --status reverted 006 2>/dev/null || true

          # Mark versions that were applied outside this pipeline as applied.
          echo "Marking manually-applied migrations..."
          for version in 009 010 011 012 013 014 015 016 017; do
            supabase migration repair --status applied $version 2>/dev/null || true
          done

      - name: Push new migrations
        run: |
          echo "Y" | supabase db push
          echo "Migration push complete."

      - name: Verify migration
        run: supabase migration list
