# .github/workflows/db-migrate.yml
name: 'Supabase DB Migration'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate-db:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref uvxrdmwmscevovbbrnky

      - name: Reconcile migration history
        run: |
          # Mark any local migrations that were applied outside of this pipeline
          # as 'applied' so the CLI doesn't try to re-run them.
          # This is safe to run repeatedly — already-applied versions are a no-op.
          echo "Reconciling migration history..."
          supabase migration list 2>&1 || true

          # Repair versions that exist locally but aren't tracked in schema_migrations.
          # These were applied manually or by earlier tooling before this pipeline existed.
          for version in 006 009 010 011 012 013 014 015 016 017; do
            supabase migration repair --status applied $version 2>/dev/null || true
          done

      - name: Push new migrations
        run: |
          echo "Y" | supabase db push
          echo "Migration push complete."

      - name: Verify migration
        run: supabase migration list
